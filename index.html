<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    
    <!-- 1. SEO: Tell search engines this is the new location -->
    <link rel="canonical" href="https://jaroslawostapenko.mqttwebs.com/">
    
    <!-- 2. Meta Refresh: Redirects automatically after 0 seconds -->
    <meta http-equiv="refresh" content="0; url=https://jaroslawostapenko.mqttwebs.com/">
    
    <!-- 3. JavaScript Redirect: Faster execution for modern browsers -->
    <script type="text/javascript">
        window.location.href = "https://jaroslawostapenko.mqttwebs.com/";
    </script>
</head>
<body>
    <!-- 4. Fallback link for users with JS disabled -->
    <p>The page has moved. If you are not redirected automatically, please click here: 
    <a href="https://jaroslawostapenko.mqttwebs.com/">https://jaroslawostapenko.mqttwebs.com/</a></p>
</body>
</html>
